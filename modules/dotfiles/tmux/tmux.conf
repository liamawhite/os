# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on

# Prefix: Ctrl+A
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Vi copy mode
set -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Pane navigation (vi-style, prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits (prefix fallback)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Cmd+key bindings (via Ghostty escape sequences, no prefix needed)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-H resize-pane -L 1
bind -n M-J resize-pane -D 1
bind -n M-K resize-pane -U 1
bind -n M-L resize-pane -R 1
bind -n 'M-{' resize-pane -L 5
bind -n 'M-}' resize-pane -D 5
bind -n 'M-~' resize-pane -U 5
bind -n 'M->' resize-pane -R 5
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-w kill-pane
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n 'M-|' split-window -h -c "#{pane_current_path}"
bind -n 'M-_' split-window -v -c "#{pane_current_path}"

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# Catppuccin Mocha status bar
# base=#1e1e2e surface0=#313244 surface1=#45475a overlay0=#6c7086
# text=#cdd6f4 mauve=#cba6f7 blue=#89b4fa green=#a6e3a1

set -g status 2
set -g status-position top
set -g status-format[1] "#[bg=#1e1e2e] "
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left: session name
set -g status-left "#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[bg=#1e1e2e,fg=#cba6f7]"
set -g status-left-length 30

# Right: k8s context, cwd, date and time
set -g status-right "#[fg=#89b4fa]#(kubectl config current-context 2>/dev/null || echo 'no kube context') #[fg=#6c7086]│ #[fg=#a6e3a1]#(~/bin/tmux-cwd #{pane_current_path}) #[fg=#6c7086]│ %Y-%m-%d  %H:%M "
set -g status-right-length 100

# Window tabs
set -g window-status-format "#[bg=#1e1e2e,fg=#6c7086]  #I:#W  "
set -g window-status-current-format "#[bg=#313244,fg=#cba6f7,bold]  #I:#W  "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#cba6f7"

# Message style
set -g message-style "bg=#313244,fg=#cdd6f4"
